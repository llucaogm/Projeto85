  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rog-item\">\n        <div class=\"prog-meta\">\n          <span class=\"prog-nome\">Peso a eliminar<\u002Fspan>\n          <span class=\"prog-nums\"><span id=\"js-bar-peso\">96.2<\u002Fspan>kg → 85kg<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"prog-track\">\n          <div class=\"prog-fill lime\" id=\"js-fill-peso\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prog-pct lime\" id=\"js-pct-peso\">— eliminado<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"prog-item\">\n        <div class=\"prog-meta\">\n          <span class=\"prog-nome\">Seguidores no Instagram<\u002Fspan>\n          <span class=\"prog-nums\"><span id=\"js-bar-segs\">—<\u002Fspan> de 85k<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"prog-track\">\n          <div class=\"prog-fill orange\" id=\"js-fill-segs\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"prog-pct orange\" id=\"js-pct-segs\">— da meta<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ QUERIDÔMETRO ═════════ -->\n  <section>\n    <div class=\"sec-head reveal\">\n      <p class=\"sec-tag\">Você aí<\u002Fp>\n      <h2 class=\"sec-titulo\">Queridô<em>metro<\u002Fem><\u002Fh2>\n      <p class=\"sec-sub\">Vota uma vez. Sem julgamento.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"q-grid reveal-stagger\">\n      <button class=\"q-btn\" id=\"q-torce\" onclick=\"votar('torce')\">\n        <span class=\"q-emoji\">🔥<\u002Fspan>\n        <span class=\"q-count\" id=\"n-torce\">0<\u002Fspan>\n        <span class=\"q-label\">Torce<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"q-btn\" id=\"q-duvida\" onclick=\"votar('duvida')\">\n        <span class=\"q-emoji\">🤨<\u002Fspan>\n        <span class=\"q-count\" id=\"n-duvida\">0<\u002Fspan>\n        <span class=\"q-label\">Duvida<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"q-btn\" id=\"q-admira\" onclick=\"votar('admira')\">\n        <span class=\"q-emoji\">💪<\u002Fspan>\n        <span class=\"q-count\" id=\"n-admira\">0<\u002Fspan>\n        <span class=\"q-label\">Admira<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n    <p class=\"q-nota reveal\">Contagem salva no seu dispositivo. Um voto por pessoa.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ═════════ DESAFIOS ═════════ -->\n  <section>\n    <div class=\"sec-head reveal\">\n      <p class=\"sec-tag\">Missões<\u002Fp>\n      <h2 class=\"sec-titulo\">Desafios do <em>público<\u002Fem><\u002Fh2>\n      <p class=\"sec-sub\">Manda o teu lá embaixo. Pode ser cruel (dentro do razoável).<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"desafios-lista reveal-stagger\">\n      <div class=\"desafio\">\n        <div class=\"desafio-topo\">\n          <p class=\"desafio-txt\">Subir a Serra do Cipó sem parar pra descansar<\u002Fp>\n          <span class=\"badge badge-andamento\">Em andamento<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"desafio-autor\">por Rodrigo M.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"desafio\">\n        <div class=\"desafio-topo\">\n          <p class=\"desafio-txt\">Tirar uma semana sem cerveja<\u002Fp>\n          <span class=\"badge badge-aceito\">Aceito<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"desafio-autor\">por Camila F.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"desafio\">\n        <div class=\"desafio-topo\">\n          <p class=\"desafio-txt\">30 dias sem carboidrato<\u002Fp>\n          <span class=\"badge badge-recusado\">Recusado<\u002Fspan>\n        <\u002Fdiv>\n        <p class=\"desafio-autor\">por Anônimo · vida é curta demais<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ SPOTIFY ═════════ -->\n  <section>\n    <div class=\"sec-head reveal\">\n      <p class=\"sec-tag\">Trilha sonora<\u002Fp>\n      <h2 class=\"sec-titulo\">Playlist do <em>projeto<\u002Fem><\u002Fh2>\n      <p class=\"sec-sub\">O que toca no treino e no sofrimento.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"spotify-box reveal\">\n      <iframe src=\"https://open.spotify.com/embed/playlist/37i9dQZF1DX76Wlfdnj7AP?utm_source=generator&amp;theme=0\" height=\"152\" frameborder=\"0\" allow=\"autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture\" loading=\"lazy\">\n      <\u002Fiframe>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ FORM ═════════ -->\n  <section>\n    <div class=\"sec-head reveal\">\n      <p class=\"sec-tag\">Participa<\u002Fp>\n      <h2 class=\"sec-titulo\">Manda seu <em>desafio<\u002Fem><\u002Fh2>\n      <p class=\"sec-sub\">Vou ler tudo. Não prometo aceitar.<\u002Fp>\n    <\u002Fdiv>\n\n    <form class=\"form-campos reveal-stagger\" id=\"formDesafio\" onsubmit=\"enviar(event)\" novalidate=\"\">\n      <div class=\"campo\">\n        <label class=\"campo-label\" for=\"inp-nome\">Seu nome ou apelido<\u002Flabel>\n        <input class=\"campo-input\" type=\"text\" id=\"inp-nome\" placeholder=\"João da Silva\" maxlength=\"60\" required=\"\">\n      <\u002Fdiv>\n      <div class=\"campo\">\n        <label class=\"campo-label\" for=\"inp-desafio\">O desafio<\u002Flabel>\n        <textarea class=\"campo-area\" id=\"inp-desafio\" placeholder=\"Seja específico. 'Fazer exercício' não conta.\" rows=\"4\" maxlength=\"300\" required=\"\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <button type=\"submit\" class=\"form-btn\">\n        <span>Mandar desafio<\u002Fspan>\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fform>\n\n    <div class=\"form-ok\" id=\"js-form-ok\">\n      Desafio recebido. Vou avaliar se tenho coragem de aceitar.\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ═════════ CTA ═════════ -->\n  <section class=\"cta\">\n    <p class=\"cta-principal reveal\">Acompanha o <em>dia a dia<\u002Fem><\u002Fp>\n    <p class=\"cta-secundario reveal\">Atualizações, erros e vergonhas ao vivo. Bora pros 85k juntos.<\u002Fp>\n    <a class=\"cta-link reveal\" href=\"https://instagram.com/seuperfil\" target=\"_blank\" rel=\"noopener noreferrer\">\n      @seuperfil\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M7 17L17 7M9 7h8v8\"><\u002Fpath>\n      <\u002Fsvg>\n    <\u002Fa>\n  <\u002Fsection>\n\n  <!-- ═════════ FOOTER ═════════ -->\n  <footer>\n    <span class=\"footer-mark\">Projeto 85<\u002Fspan>\n    <span>por <strong>Lucas<\u002Fstrong> · início <strong id=\"js-data-inicio\">—<\u002Fstrong><\u002Fspan>\n  <\u002Ffooter>\n<\u002Fdiv>\n\n<script>\n/* ═══════════════════════════════════════════════════════\n   CONFIG — ATUALIZE ESSES VALORES QUANDO NECESSÁRIO\n════════════════════════════════════════════════════════ */\nconst C = {\n  dataInicio:        '2026-06-01',\n  pesoAtual:          96.2,\n  pesoInicial:        97,\n  pesoMeta:           85,\n  seguidoresAtuais:   12500,\n  seguidoresMeta:     85000,\n  diasTotal:          180,\n};\n\n/* ── DIA / DATA ─────────────────────────────────────── */\n(function () {\n  const [y, m, d] = C.dataInicio.split('-').map(Number);\n  const inicio = new Date(y, m - 1, d);\n  const hoje = new Date();\n  const diff = Math.floor((hoje - inicio) / 86400000);\n  const dia  = Math.min(Math.max(diff + 1, 1), C.diasTotal);\n  const dataFmt = inicio.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });\n\n  document.getElementById('js-dia-contador-num').textContent = dia;\n  document.getElementById('js-data-inicio-chip').textContent = dataFmt;\n  document.getElementById('js-data-inicio').textContent      = dataFmt;\n})();\n\n/* ── DISPLAY ────────────────────────────────────────── */\ndocument.getElementById('js-peso-atual').textContent = C.pesoAtual;\ndocument.getElementById('js-bar-peso').textContent   = C.pesoAtual;\ndocument.getElementById('tb-peso').textContent       = C.pesoAtual;\ndocument.getElementById('ring-num-peso').textContent = C.pesoAtual;\n\nconst eliminadoAbs = Math.max(0, C.pesoInicial - C.pesoAtual);\ndocument.getElementById('js-perdido').textContent = eliminadoAbs.toFixed(1);\n\nconst segsLabel = C.seguidoresAtuais >= 1000\n  ? (C.seguidoresAtuais / 1000).toFixed(1).replace(/\\.0$/, '') + 'k'\n  : C.seguidoresAtuais;\ndocument.getElementById('js-bar-segs').textContent   = segsLabel;\ndocument.getElementById('ring-num-segs').textContent = segsLabel;\ndocument.getElementById('tb-segs').textContent       = segsLabel;\n\n/* ── CÁLCULOS ───────────────────────────────────────── */\nconst totalEliminar = C.pesoInicial - C.pesoMeta;\nconst pctPeso = Math.min(100, Math.max(0, (eliminadoAbs / totalEliminar) * 100));\nconst pctSegs = Math.min(100, (C.seguidoresAtuais / C.seguidoresMeta) * 100);\n\ndocument.getElementById('js-pct-peso').textContent = pctPeso.toFixed(1) + '% eliminado';\ndocument.getElementById('js-pct-segs').textContent = pctSegs.toFixed(1) + '% da meta';\n\n/* ── ANÉIS ─────────────────────────────────────────── */\nfunction animateRing(circleId, pctTextId, pctTarget) {\n  const circle = document.getElementById(circleId);\n  const txt    = document.getElementById(pctTextId);\n  const r = 56;\n  const C0 = 2 * Math.PI * r;\n  circle.style.strokeDasharray = C0;\n  circle.style.strokeDashoffset = C0;\n  requestAnimationFrame(() => {\n    requestAnimationFrame(() => {\n      circle.style.strokeDashoffset = C0 * (1 - pctTarget / 100);\n    });\n  });\n  const dur = 1800;\n  const t0 = performance.now();\n  function step(now) {\n    const k = Math.min(1, (now - t0) / dur);\n    const eased = 1 - Math.pow(1 - k, 4);\n    txt.textContent = (pctTarget * eased).toFixed(pctTarget >= 10 ? 0 : 1);\n    if (k < 1) requestAnimationFrame(step);\n    else txt.textContent = pctTarget.toFixed(pctTarget >= 10 ? 0 : 1);\n  }\n  requestAnimationFrame(step);\n}\n\nwindow.addEventListener('load', function () {\n  setTimeout(function () {\n    document.getElementById('js-fill-peso').style.width = pctPeso.toFixed(1) + '%';\n    document.getElementById('js-fill-segs').style.width = pctSegs.toFixed(1) + '%';\n    animateRing('ring-peso', 'ring-pct-peso', pctPeso);\n    animateRing('ring-segs', 'ring-pct-segs', pctSegs);\n  }, 320);\n});\n\n/* ── QUERIDÔMETRO ──────────────────────────────────── */\nconst tipos = ['torce', 'duvida', 'admira'];\nconst seed = { torce: 41, duvida: 14, admira: 28 };\n\nfunction carregarContagens() {\n  tipos.forEach(function (t) {\n    const salvo = localStorage.getItem('p85_' + t);\n    const total = seed[t] + (salvo ? parseInt(salvo) : 0);\n    document.getElementById('n-' + t).textContent = total;\n  });\n  const votou = localStorage.getItem('p85_votou');\n  if (votou) {\n    document.getElementById('q-' + votou).classList.add('votado');\n    tipos.forEach(function (t) {\n      document.getElementById('q-' + t).disabled = true;\n    });\n  }\n}\nfunction votar(tipo) {\n  if (localStorage.getItem('p85_votou')) return;\n  const anterior = parseInt(localStorage.getItem('p85_' + tipo) || '0');\n  localStorage.setItem('p85_' + tipo, anterior + 1);\n  localStorage.setItem('p85_votou', tipo);\n  const total = seed[tipo] + anterior + 1;\n  const el = document.getElementById('n-' + tipo);\n  el.textContent = total;\n  el.animate(\n    [{ transform: 'scale(1)' }, { transform: 'scale(1.25)' }, { transform: 'scale(1)' }],\n    { duration: 420, easing: 'cubic-bezier(.34,1.56,.64,1)' }\n  );\n  // pequeno burst\n  const btn = document.getElementById('q-' + tipo);\n  btn.classList.add('votado');\n  for (let i = 0; i < 6; i++) {\n    const dot = document.createElement('span');\n    dot.style.cssText = `\n      position:absolute; left:50%; top:50%;\n      width:6px; height:6px; border-radius:50%;\n      background:currentColor; color:var(--c, var(--orange));\n      pointer-events:none; z-index:2;\n    `;\n    btn.appendChild(dot);\n    const ang = (i / 6) * Math.PI * 2;\n    const dist = 50 + Math.random() * 20;\n    dot.animate(\n      [\n        { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },\n        { transform: `translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px)) scale(0)`, opacity: 0 }\n      ],\n      { duration: 700, easing: 'cubic-bezier(.16,1,.3,1)' }\n    ).onfinish = () => dot.remove();\n  }\n  tipos.forEach(function (t) {\n    document.getElementById('q-' + t).disabled = true;\n  });\n}\ncarregarContagens();\n\n/* ── FORM ──────────────────────────────────────────── */\nfunction enviar(e) {\n  e.preventDefault();\n  const nome = document.getElementById('inp-nome').value.trim();\n  const desafio = document.getElementById('inp-desafio').value.trim();\n  if (!nome || !desafio) return;\n  const form = document.getElementById('formDesafio');\n  const ok   = document.getElementById('js-form-ok');\n  form.style.transition = 'opacity .4s ease, transform .4s ease';\n  form.style.opacity = '0';\n  form.style.transform = 'translateY(-8px)';\n  setTimeout(() => {\n    form.style.display = 'none';\n    ok.style.display = 'block';\n    ok.animate(\n      [{ opacity: 0, transform: 'translateY(10px)' }, { opacity: 1, transform: 'translateY(0)' }],\n      { duration: 500, easing: 'cubic-bezier(.16,1,.3,1)', fill: 'forwards' }\n    );\n  }, 380);\n}\n\n/* ── REVEAL ────────────────────────────────────────── */\nconst io = new IntersectionObserver((entries) => {\n  entries.forEach((e) => {\n    if (e.isIntersecting) {\n      e.target.classList.add('in');\n      io.unobserve(e.target);\n    }\n  });\n}, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });\ndocument.querySelectorAll('.reveal, .reveal-stagger').forEach((el) => io.observe(el));\n\n/* ── TOPBAR ────────────────────────────────────────── */\nconst topbar = document.getElementById('topbar');\nwindow.addEventListener('scroll', () => {\n  if (window.scrollY > 320) topbar.classList.add('show');\n  else topbar.classList.remove('show');\n}, { passive: true });\n\n/* ── CURSOR BLOB ──────────────────────────────────── */\nconst blob = document.getElementById('cursorBlob');\nlet bx = window.innerWidth / 2, by = window.innerHeight / 2;\nlet tx = bx, ty = by;\nwindow.addEventListener('mousemove', (e) => {\n  tx = e.clientX; ty = e.clientY;\n}, { passive: true });\nfunction tickBlob() {\n  bx += (tx - bx) * 0.12;\n  by += (ty - by) * 0.12;\n  blob.style.transform = `translate(${bx}px, ${by}px) translate(-50%, -50%)`;\n  requestAnimationFrame(tickBlob);\n}\ntickBlob();\n\n/* ── HOVER MAGNÉTICO nos cards ────────────────────── */\ndocument.querySelectorAll('.ring-card, .desafio').forEach((card) => {\n  card.addEventListener('mousemove', (e) => {\n    const r = card.getBoundingClientRect();\n    const x = ((e.clientX - r.left) / r.width) * 100;\n    const y = ((e.clientY - r.top) / r.height) * 100;\n    card.style.setProperty('--mx', x + '%');\n    card.style.setProperty('--my', y + '%');\n  });\n});\n\n/* ── TAP no ring para reanimar ────────────────────── */\ndocument.querySelectorAll('.ring-card').forEach((card) => {\n  card.addEventListener('click', () => {\n    const which = card.dataset.ring;\n    if (which === 'peso') animateRing('ring-peso', 'ring-pct-peso', pctPeso);\n    if (which === 'segs') animateRing('ring-segs', 'ring-pct-segs', pctSegs);\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
